[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://localhost:3000"
# Password-reset emails link to `${API_BASE_URL}/auth/confirm-reset`; GoTrue
# silently falls back to site_url if the redirect isn't allow-listed
additional_redirect_urls = [
  "https://localhost:3000",
  "http://localhost:3000/auth/confirm-reset",
  "https://api.domicoop.org/auth/confirm-reset",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# Match the API's t.String({ minLength: 8 }) password validation
minimum_password_length = 8

# Local-only: the default token-verification limit (30/5min) breaks E2E test
# runs, since the API re-validates the JWT on every request
[auth.rate_limit]
token_verifications = 1000

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
